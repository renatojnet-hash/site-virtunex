<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtunex — Em breve</title>
  <meta name="description" content="A Virtunex está chegando. Em breve nosso site estará no ar com novidades." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="Virtunex — Em breve" />
  <meta property="og:description" content="A Virtunex está chegando. Em breve nosso site estará no ar com novidades." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://virtunex.com.br" />
  <meta property="og:image" content="https://virtunex.com.br/og-image.png" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Virtunex — Em breve" />
  <meta name="twitter:description" content="A Virtunex está chegando. Em breve nosso site estará no ar com novidades." />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-start: #0a0e1a;
      --bg-end: #0f1e38;
      --accent: #3b82f6;
      --accent-light: #60a5fa;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: rgba(59, 130, 246, 0.2);
      --card-bg: rgba(255, 255, 255, 0.04);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 3rem;
    }

    .logo-mark {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      color: #fff;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--accent-light);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }

    /* Heading */
    h1 {
      font-size: clamp(2rem, 6vw, 3.25rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.1rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 480px;
      margin: 0 auto 2.5rem;
      font-weight: 300;
    }

    /* Email form */
    .notify-form {
      display: flex;
      gap: 0.5rem;
      max-width: 420px;
      margin: 0 auto 1rem;
    }

    .notify-form input[type="email"] {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .notify-form input[type="email"]::placeholder {
      color: var(--text-secondary);
    }

    .notify-form input[type="email"]:focus {
      border-color: var(--accent);
    }

    .notify-form button {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    .notify-form button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .notify-form button:active {
      transform: translateY(0);
    }

    .form-note {
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 2rem;
    }

    /* Footer */
    footer {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    footer a {
      color: var(--accent-light);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .notify-form {
        flex-direction: column;
      }

      .notify-form button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo">
      <div class="logo-mark">Vx</div>
      <span class="logo-text">Virtunex</span>
    </div>

    <span class="badge">Em breve</span>

    <h1>Algo novo está chegando</h1>

    <p class="tagline">
      Estamos construindo algo especial. Em breve o site da Virtunex estará no ar com tudo que você precisa saber.
    </p>

    <form class="notify-form" onsubmit="handleSubmit(event)">
      <input
        type="email"
        id="email"
        placeholder="seu@email.com.br"
        autocomplete="email"
        required
      />
      <button type="submit">Avise-me</button>
    </form>

    <p class="form-note">Sem spam. Apenas quando estiver pronto.</p>

    <div class="divider"></div>

    <footer>
      <p>&copy; <span id="year"></span> Virtunex. Todos os direitos reservados.</p>
      <p><a href="mailto:contato@virtunex.com.br">contato@virtunex.com.br</a></p>
    </footer>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function handleSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const note = form.nextElementSibling;
      form.innerHTML = '<p style="color:#10b981;font-size:0.95rem;font-weight:500;">Obrigado! Avisaremos você assim que estivermos no ar.</p>';
      if (note) note.style.display = 'none';
    }
  </script>
</body>
</html>
